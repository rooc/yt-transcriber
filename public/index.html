<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>YouTube Video with Transcript</title>
		<link rel="icon" href="favicon.svg" type="image/svg+xml" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
		<link
			href="https://fonts.googleapis.com/icon?family=Material+Icons"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div class="container">
			<div class="header-sidebar">
				<span class="material-icons" style="font-size: 32px; color: #ff0000"
					>play_circle</span
				>
				<span style="font-size: 1.5rem; font-weight: 600; margin-left: 8px"
					>YT-trans</span
				>
			</div>
			<div class="header-main">
				<h1 id="videoTitle">YouTube Video with Transcript</h1>
			</div>

			<div class="sidebar">
				<div class="panel" id="availableTranscripts">
					<h3>Available transcripts:</h3>
					<div id="transcriptTags"></div>
				</div>

				<div class="panel" id="learnedTranscripts">
					<h3 class="collapsible-header" onclick="toggleLearnedPanel()">
						<span class="material-icons" id="learnedToggleIcon"
							>expand_more</span
						>
						Learned transcripts
					</h3>
					<div
						id="learnedTags"
						class="collapsible-content collapsed"
					></div>
				</div>

				<div class="panel" id="grammarPanel">
					<h3 class="collapsible-header" onclick="toggleGrammarPanel()">
						<span class="material-icons" id="grammarToggleIcon">expand_more</span>
						Grammar sentences
					</h3>
					<div id="grammarContent" class="collapsible-content collapsed">
						<div id="grammarSentences">Select a transcript to see grammar examples</div>
					</div>
				</div>

				<div class="controls">
					<button
						id="pauseBtn"
						onclick="togglePause()"
						title="Pause/Play (Space)"
					>
						<span class="material-icons">pause</span>
					</button>
					<button
						onclick="rewindBack()"
						title="Go to start of current line (←)"
					>
						<span class="material-icons">replay_10</span>
					</button>
					<button
						onclick="rewindForward()"
						title="Go to start of next line (→)"
					>
						<span class="material-icons">forward_10</span>
					</button>
					<button onclick="restartVideo()" title="Restart video">
						<span class="material-icons">skip_previous</span>
					</button>
					<button
						id="dualBtn"
						onclick="toggleDual()"
						title="Toggle dual translation (D)"
					>
						<span class="material-icons">view_comfy</span>
					</button>
					<button
						onclick="toggleFullscreen()"
						title="Toggle fullscreen (F)"
					>
						<span class="material-icons">fullscreen</span>
					</button>
				</div>

				<div id="status">Ready</div>
			</div>

			<div class="main">
				<div class="video-wrapper">
					<div id="player"></div>
					<div id="videoLoadingOverlay" class="video-loading-overlay">
						<div class="loading-spinner"></div>
						<div class="loading-text">Restoring progress...</div>
					</div>
				</div>

				<div class="transcript-container" id="transcript">
					<div class="loading">Select a transcript to start</div>
				</div>

				<div class="progress-bar">
					<div class="progress-fill" id="progressFill"></div>
				</div>
			</div>
		</div>

		<!-- Floating controls for fullscreen mode -->
		<div class="fullscreen-controls">
			<button onclick="rewindBack()" title="Go to start of current line (←)">
				<span class="material-icons">replay_10</span>
			</button>
			<button onclick="rewindForward()" title="Go to start of next line (→)">
				<span class="material-icons">forward_10</span>
			</button>
			<button
				id="fsPauseBtn"
				onclick="togglePause()"
				title="Pause/Play (Space)"
			>
				<span class="material-icons">pause</span>
			</button>
			<button
				id="fsDualBtn"
				onclick="toggleDual()"
				title="Toggle dual translation (D)"
			>
				<span class="material-icons">view_comfy</span>
			</button>
			<button onclick="restartVideo()" title="Restart video">
				<span class="material-icons">skip_previous</span>
			</button>
			<button onclick="toggleFullscreen()" title="Exit fullscreen (F)">
				<span class="material-icons">fullscreen_exit</span>
			</button>
		</div>

		<!-- Grammar Modal -->
		<div id="grammarModal" class="grammar-modal">
			<div class="grammar-modal-content">
				<span class="grammar-modal-close" onclick="closeGrammarModal()">&times;</span>
				<div id="grammarModalContent"></div>
			</div>
		</div>

		<script src="https://www.youtube.com/iframe_api"></script>
		<script src="app.js"></script>
	</body>
</html>
